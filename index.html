<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIC Prathiba Sangamam</title>
<link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Anek Malayalam', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px;
  gap: 12px;
}

h3 {
  font-size: 18px;
  font-weight: 700;
  color: #1a1a2e;
  text-align: center;
  padding: 4px 0;
}

canvas {
  width: 100%;
  max-width: 500px;
  height: auto;
  border-radius: 10px;
  background: #ddd;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: block;
  touch-action: none;
}

.controls {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.field { display: flex; flex-direction: column; gap: 4px; }

label {
  font-size: 12px;
  font-weight: 600;
  color: #555;
  letter-spacing: 0.03em;
}

input, select {
  width: 100%;
  padding: 9px 11px;
  font-size: 14px;
  border-radius: 7px;
  border: 1.5px solid #d0d8e4;
  background: #fff;
  color: #222;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: #0a7cff; }
input[type="file"] { padding: 7px 9px; font-size: 12px; color: #666; cursor: pointer; }
input[type="color"] {
  padding: 2px;
  height: 38px;
  width: 100%;
  cursor: pointer;
  border-radius: 7px;
}
select option { background: #fff; }

.dl-btn {
  width: 100%;
  padding: 13px;
  font-size: 16px;
  border-radius: 9px;
  border: none;
  background: linear-gradient(135deg, #0a7cff, #0056b3);
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.03em;
  transition: opacity 0.2s, transform 0.15s;
  margin-top: 4px;
}
.dl-btn:active { opacity: 0.88; transform: scale(0.99); }
</style>
</head>
<body>

<h3>MIC Prathiba Sangamam</h3>

<canvas id="canvas" width="2480" height="2953"></canvas>

<div class="controls">

  <!-- Photo & Name -->
  <div class="row">
    <div class="field">
      <label>Photo</label>
      <input type="file" id="upload" accept="image/*">
    </div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="nameInput" placeholder="Enter name">
    </div>
  </div>

  <!-- Class & Result -->
  <div class="row">
    <div class="field">
      <label>Class</label>
      <select id="classSelect">
        <option value="5th">5th</option>
        <option value="7th">7th</option>
      </select>
    </div>
    <div class="field">
      <label>Result</label>
      <select id="resultSelect">
        <option value="Distinction">Distinction</option>
        <option value="Top Plus">Top Plus</option>
      </select>
    </div>
  </div>

  <button class="dl-btn" onclick="downloadImage()">⬇ Download</button>

</div>

<script>
// ── EDIT THESE VALUES TO ADJUST TEXT POSITION & STYLE ──
const CFG = {
  nameSize:   78,        // Name Font Size
  detailSize: 67,        // Details Font Size
  lineGap:    18,        // Line Gap
  textColor:  "#ffffff", // Text Colour
  textX:      812,       // Text X (px)
  textY:      2369       // Text Y (px)
};
// ─────────────────────────────────────────────────────

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let userImage = null;
let photoScale = 1, photoPosX = 0, photoPosY = 0;
let photoDragging = false, dragStartX, dragStartY, startPX, startPY;

const frameImage = new Image();
frameImage.crossOrigin = "anonymous";
frameImage.src = "frame.png";

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (userImage) {
    ctx.drawImage(userImage, photoPosX, photoPosY,
      userImage.width * photoScale, userImage.height * photoScale);
  }

  if (frameImage.complete && frameImage.naturalWidth) {
    ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
  }

  const name = document.getElementById("nameInput").value || "";
  const cls  = document.getElementById("classSelect").value;
  const res  = document.getElementById("resultSelect").value;

  ctx.fillStyle    = CFG.textColor;
  ctx.textAlign    = "center";
  ctx.textBaseline = "alphabetic";

  ctx.font = `700 ${CFG.nameSize}px 'Anek Malayalam'`;
  ctx.fillText(name, CFG.textX, CFG.textY);

  ctx.font = `600 ${CFG.detailSize}px 'Anek Malayalam'`;
  ctx.fillText(`${cls} - ${res}`, CFG.textX, CFG.textY + CFG.nameSize + CFG.lineGap);
}

// ── Canvas coordinate helper ──
function coords(e, touch) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const src = touch ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

// ── Mouse drag ──
canvas.addEventListener("mousedown", e => {
  const c = coords(e, false);
  photoDragging = true;
  dragStartX = c.x; dragStartY = c.y;
  startPX = photoPosX; startPY = photoPosY;
});
window.addEventListener("mousemove", e => {
  if (!photoDragging) return;
  const c = coords(e, false);
  photoPosX = startPX + (c.x - dragStartX);
  photoPosY = startPY + (c.y - dragStartY);
  drawCanvas();
});
window.addEventListener("mouseup", () => photoDragging = false);

// ── Touch drag ──
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const c = coords(e, true);
  photoDragging = true;
  dragStartX = c.x; dragStartY = c.y;
  startPX = photoPosX; startPY = photoPosY;
}, { passive: false });
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!photoDragging) return;
  const c = coords(e, true);
  photoPosX = startPX + (c.x - dragStartX);
  photoPosY = startPY + (c.y - dragStartY);
  drawCanvas();
}, { passive: false });
canvas.addEventListener("touchend", () => photoDragging = false);

// ── Scroll zoom ──
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  photoScale = Math.min(Math.max(0.1, photoScale - e.deltaY * 0.001), 10);
  drawCanvas();
}, { passive: false });

// ── Upload ──
document.getElementById("upload").addEventListener("change", function(e) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      userImage = img;
      photoScale = canvas.width / img.width;
      photoPosX = 0; photoPosY = 0;
      drawCanvas();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(e.target.files[0]);
});

["nameInput", "classSelect", "resultSelect"].forEach(id =>
  document.getElementById(id).addEventListener("input", drawCanvas)
);

// ── Download ──
function downloadImage() {
  const name = (document.getElementById("nameInput").value || "certificate").trim();
  const a = document.createElement("a");
  a.download = name + ".png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}
window.downloadImage = downloadImage;

frameImage.onload = drawCanvas;
frameImage.onerror = drawCanvas;
drawCanvas();
</script>
</body>
</html>
