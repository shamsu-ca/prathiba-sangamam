<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIC Prathiba Sangamam</title>

<link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Anek Malayalam",sans-serif;
background:linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 10px;
box-sizing: border-box;
}

.container{
background: white;
padding: 15px;
border-radius: 12px;
box-shadow: 0 10px 25px rgba(0,0,0,0.1);
width: 100%;
max-width: 600px;
box-sizing: border-box;
display: flex;
flex-direction: column;
height: calc(100vh - 20px);
}

h3 {
margin: 0 0 10px 0;
color: #333;
font-weight: 700;
font-size: 22px;
text-align: center;
}

canvas{
width: 100%;
height: auto;
max-height: calc(100vh - 220px);
object-fit: contain;
border-radius: 8px;
background:#eee;
margin-bottom: 15px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.row {
display: flex;
gap: 10px;
margin-bottom: 10px;
width: 100%;
}

.input-group {
flex: 1;
text-align: left;
}

label {
display: block;
margin-bottom: 4px;
font-weight: 600;
color: #555;
font-size: 14px;
}

input, select {
width: 100%;
padding: 10px;
font-size: 15px;
border-radius: 8px;
border: 2px solid #e0e0e0;
background: #fafafa;
transition: border-color 0.3s;
box-sizing: border-box;
font-family: inherit;
}

input:focus, select:focus {
border-color: #0a7cff;
outline: none;
background: #fff;
}

button{
width: 100%;
padding: 12px;
margin-top: 5px;
font-size: 17px;
border-radius: 8px;
border: none;
background: linear-gradient(45deg, #0a7cff, #0056b3);
color: white;
font-weight: bold;
cursor: pointer;
transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(10, 124, 255, 0.3);
}

@media (max-width: 400px) {
    .row {
        flex-direction: column;
    }
    canvas {
        max-height: 50vh;
    }
}

</style>
</head>

<body>

<div class="container">

<h3>MIC Prathiba Sangamam</h3>

<canvas id="canvas" width="2480" height="2953"></canvas>

<div class="controls">

<!-- Row 1: Upload and Name -->
<div class="row">
<div class="input-group">
<label>Photo</label>
<input type="file" id="upload" accept="image/*">
</div>
<div class="input-group">
<label>Name</label>
<input type="text" id="nameInput" placeholder="Enter Name">
</div>
</div>

<!-- Row 2: Class and Result -->
<div class="row">
<div class="input-group">
<label>Class</label>
<select id="classSelect">
<option value="5th">5th</option>
<option value="7th">7th</option>
</select>
</div>
<div class="input-group">
<label>Result</label>
<select id="resultSelect">
<option value="Distinction">Distinction</option>
<option value="Top Plus">Top Plus</option>
</select>
</div>
</div>

<button onclick="downloadImage()">Download Image</button>

</div>

</div>

<script>

// ==========================================
// EDITABLE CONFIGURATION
// ==========================================

const CONFIG = {
    // Font Sizes
    NAME_FONT_SIZE: 120,
    CLASS_FONT_SIZE: 90,
    RESULT_FONT_SIZE: 90,

    // Colors (Hex)
    TEXT_COLOR: "#ffffff", // Default White

    // Vertical Position (Distance from Bottom)
    // Canvas Height is 2953. 
    TEXT_HEIGHT_FROM_BOTTOM: 953, 

    // Horizontal Positions (X Axis)
    // Canvas Width is 2480. 
    COL_1_X: 413,  // canvas.width / 6
    COL_2_X: 1240, // canvas.width / 2
    COL_3_X: 2066  // canvas.width * 5 / 6
};

// ==========================================
// END CONFIGURATION
// ==========================================

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let userImage=null;
let frameImage=new Image();
frameImage.src="frame.png";

let scale=1;
let posX=0;
let posY=0;

let dragging=false;

function drawCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(userImage){
    let w=userImage.width*scale;
    let h=userImage.height*scale;
    ctx.drawImage(userImage,posX,posY,w,h);
}

if(frameImage.complete) { 
    ctx.drawImage(frameImage,0,0,canvas.width,canvas.height);
}

// Get Input Values
const name = document.getElementById("nameInput").value;
const cls = document.getElementById("classSelect").value;
const res = document.getElementById("resultSelect").value;

// Calculate Y position from bottom
const textY = canvas.height - CONFIG.TEXT_HEIGHT_FROM_BOTTOM;

ctx.fillStyle = CONFIG.TEXT_COLOR;
ctx.textAlign = "center";

// Draw Column 1
drawColumn(CONFIG.COL_1_X, textY, name, cls, res);

// Draw Column 2
drawColumn(CONFIG.COL_2_X, textY, name, cls, res);

// Draw Column 3
drawColumn(CONFIG.COL_3_X, textY, name, cls, res);
}

function drawColumn(x, y, name, cls, res){
    // Draw Name
    ctx.font = `600 ${CONFIG.NAME_FONT_SIZE}px 'Anek Malayalam'`;
    ctx.fillText(name, x, y);

    // Draw Class
    ctx.font = `600 ${CONFIG.CLASS_FONT_SIZE}px 'Anek Malayalam'`;
    ctx.fillText(cls, x, y + parseInt(CONFIG.CLASS_FONT_SIZE) + 10);

    // Draw Result
    ctx.font = `600 ${CONFIG.RESULT_FONT_SIZE}px 'Anek Malayalam'`;
    ctx.fillText(res, x, y + parseInt(CONFIG.CLASS_FONT_SIZE) + parseInt(CONFIG.RESULT_FONT_SIZE) + 25);
}

document.getElementById("upload").addEventListener("change", function(e){
    let reader=new FileReader();
    reader.onload=function(event){
        let img=new Image();
        img.onload=function(){
            userImage=img;
            scale=canvas.width/img.width;
            posX=0;
            posY=0;
            drawCanvas();
        };
        img.src=event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

// Auto-update on input changes
["nameInput", "classSelect", "resultSelect"].forEach(id => {
    document.getElementById(id).addEventListener("input", drawCanvas);
});

// Drag Logic
let dragStartX, dragStartY, startPosX, startPosY;

canvas.addEventListener("mousedown", e => {
    dragging = true;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    dragStartX = (e.clientX - rect.left) * scaleX;
    dragStartY = (e.clientY - rect.top) * scaleY;
    
    startPosX = posX;
    startPosY = posY;
});

canvas.addEventListener("mousemove", e => {
    if(!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    
    posX = startPosX + (mouseX - dragStartX);
    posY = startPosY + (mouseY - dragStartY);
    
    drawCanvas();
});

window.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("wheel", e => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(0.5, scale), 5);
    drawCanvas();
});

function downloadImage(){
    const name = document.getElementById("nameInput").value || "campaign";
    const link = document.createElement("a");
    link.download = name + ".png";
    link.href = canvas.toDataURL();
    link.click();
}

window.downloadImage = downloadImage;

frameImage.onload = drawCanvas;

</script>

</body>
</html>
