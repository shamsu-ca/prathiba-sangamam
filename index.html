<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIC Prathiba Sangamam</title>
<link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: #f0f4f8;
  font-family: 'Anek Malayalam', sans-serif;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 520px;
  margin: 0 auto;
  padding: 10px 10px 0 10px;
  gap: 8px;
}

h3 {
  font-size: 16px;
  font-weight: 700;
  color: #1a1a2e;
  text-align: center;
  flex-shrink: 0;
}

/* Canvas grows to fill remaining space */
.canvas-wrap {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  border-radius: 8px;
  background: #ccc;
  box-shadow: 0 3px 16px rgba(0,0,0,0.15);
  touch-action: none;
  user-select: none;
}

/* Controls — fixed height at bottom */
.controls {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding-bottom: 10px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.field { display: flex; flex-direction: column; gap: 3px; }

label {
  font-size: 11px;
  font-weight: 600;
  color: #666;
  letter-spacing: 0.03em;
}

input[type="text"], input[type="file"], select {
  width: 100%;
  padding: 8px 10px;
  font-size: 14px;
  border-radius: 7px;
  border: 1.5px solid #d0d8e4;
  background: #fff;
  color: #222;
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
}
input[type="text"]:focus, select:focus { border-color: #0a7cff; }
input[type="file"] { padding: 6px 8px; font-size: 12px; color: #666; }
select option { background: #fff; }

/* Zoom slider row */
.zoom-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.zoom-row label { white-space: nowrap; flex-shrink: 0; }
input[type="range"] {
  flex: 1;
  height: 4px;
  accent-color: #0a7cff;
  cursor: pointer;
  padding: 0;
  border: none;
  background: transparent;
}
.zoom-val {
  font-size: 12px;
  font-weight: 600;
  color: #0a7cff;
  min-width: 38px;
  text-align: right;
}

.dl-btn {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #0a7cff, #0056b3);
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.03em;
  -webkit-tap-highlight-color: transparent;
}
.dl-btn:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="app">

  <h3>MIC Prathiba Sangamam</h3>

  <div class="canvas-wrap">
    <canvas id="canvas" width="2480" height="2953"></canvas>
  </div>

  <div class="controls">

    <div class="row">
      <div class="field">
        <label>Photo</label>
        <input type="file" id="upload" accept="image/*">
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="nameInput" placeholder="Enter name">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Class</label>
        <select id="classSelect">
          <option value="5th">5th</option>
          <option value="7th">7th</option>
        </select>
      </div>
      <div class="field">
        <label>Result</label>
        <select id="resultSelect">
          <option value="Distinction">Distinction</option>
          <option value="Top Plus">Top Plus</option>
        </select>
      </div>
    </div>

    <!-- Zoom slider -->
    <div class="zoom-row">
      <label>Zoom</label>
      <input type="range" id="zoomSlider" min="10" max="500" value="100" step="1">
      <span class="zoom-val" id="zoomVal">100%</span>
    </div>

    <button class="dl-btn" onclick="downloadImage()">⬇ Download</button>

  </div>
</div>

<script>
// ── CONFIG — edit values here ──
const CFG = {
  nameSize:   78,
  detailSize: 67,
  lineGap:    18,
  textColor:  "#ffffff",
  textX:      812,
  textY:      2369
};

const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
const slider = document.getElementById("zoomSlider");
const zoomVal= document.getElementById("zoomVal");

let userImage = null;
let photoScale = 1, photoPosX = 0, photoPosY = 0;
let dragging = false, dragStartX = 0, dragStartY = 0, startPX = 0, startPY = 0;

const frameImage = new Image();
frameImage.crossOrigin = "anonymous";
frameImage.src = "frame.png";

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (userImage) {
    ctx.drawImage(userImage, photoPosX, photoPosY,
      userImage.width * photoScale, userImage.height * photoScale);
  }

  if (frameImage.complete && frameImage.naturalWidth) {
    ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
  }

  const name = document.getElementById("nameInput").value || "";
  const cls  = document.getElementById("classSelect").value;
  const res  = document.getElementById("resultSelect").value;

  ctx.fillStyle    = CFG.textColor;
  ctx.textAlign    = "center";
  ctx.textBaseline = "alphabetic";

  ctx.font = `700 ${CFG.nameSize}px 'Anek Malayalam'`;
  ctx.fillText(name, CFG.textX, CFG.textY);

  ctx.font = `600 ${CFG.detailSize}px 'Anek Malayalam'`;
  ctx.fillText(`${cls} - ${res}`, CFG.textX, CFG.textY + CFG.nameSize + CFG.lineGap);
}

// ── Canvas coords (handles display vs actual canvas size) ──
function toCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width  / rect.width),
    y: (clientY - rect.top)  * (canvas.height / rect.height)
  };
}

// ── Mouse ──
canvas.addEventListener("mousedown", e => {
  e.preventDefault();
  const c = toCanvas(e.clientX, e.clientY);
  dragging = true; dragStartX = c.x; dragStartY = c.y;
  startPX = photoPosX; startPY = photoPosY;
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  const c = toCanvas(e.clientX, e.clientY);
  photoPosX = startPX + (c.x - dragStartX);
  photoPosY = startPY + (c.y - dragStartY);
  drawCanvas();
});
window.addEventListener("mouseup", () => dragging = false);

// ── Touch (single finger = drag, does NOT block page scroll outside canvas) ──
canvas.addEventListener("touchstart", e => {
  if (e.touches.length !== 1) return;
  e.preventDefault();
  const t = e.touches[0];
  const c = toCanvas(t.clientX, t.clientY);
  dragging = true; dragStartX = c.x; dragStartY = c.y;
  startPX = photoPosX; startPY = photoPosY;
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  if (!dragging || e.touches.length !== 1) return;
  e.preventDefault();
  const t = e.touches[0];
  const c = toCanvas(t.clientX, t.clientY);
  photoPosX = startPX + (c.x - dragStartX);
  photoPosY = startPY + (c.y - dragStartY);
  drawCanvas();
}, { passive: false });

canvas.addEventListener("touchend", () => dragging = false);

// ── Zoom slider ──
slider.addEventListener("input", () => {
  if (!userImage) return;
  const pct = parseInt(slider.value);
  zoomVal.textContent = pct + "%";
  // Scale relative to original fit-to-canvas scale
  photoScale = (canvas.width / userImage.width) * (pct / 100);
  drawCanvas();
});

// ── Scroll wheel (desktop) ──
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  if (!userImage) return;
  photoScale = Math.min(Math.max(0.05, photoScale - e.deltaY * 0.001), 10);
  const baseScale = canvas.width / userImage.width;
  const pct = Math.round((photoScale / baseScale) * 100);
  slider.value = Math.min(Math.max(10, pct), 500);
  zoomVal.textContent = slider.value + "%";
  drawCanvas();
}, { passive: false });

// ── Upload ──
document.getElementById("upload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      userImage = img;
      photoScale = canvas.width / img.width;
      photoPosX = 0; photoPosY = 0;
      slider.value = 100;
      zoomVal.textContent = "100%";
      drawCanvas();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── Live text updates ──
["nameInput", "classSelect", "resultSelect"].forEach(id =>
  document.getElementById(id).addEventListener("input", drawCanvas)
);

// ── Download ──
function downloadImage() {
  const name = (document.getElementById("nameInput").value || "certificate").trim();
  const a = document.createElement("a");
  a.download = name + ".png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}
window.downloadImage = downloadImage;

frameImage.onload  = drawCanvas;
frameImage.onerror = drawCanvas;
drawCanvas();
</script>
</body>
</html>
