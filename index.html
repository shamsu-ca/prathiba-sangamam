<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIC Prathiba Sangamam</title>

<link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Anek Malayalam",sans-serif;
background:linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 10px;
box-sizing: border-box;
}

.container{
background: white;
padding: 15px;
border-radius: 12px;
box-shadow: 0 10px 25px rgba(0,0,0,0.1);
width: 100%;
max-width: 600px;
box-sizing: border-box;
display: flex;
flex-direction: column;
height: calc(100vh - 20px);
position: relative;
}

/* Header & Admin Button */
.header-row {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 10px;
width: 100%;
}

h3 {
margin: 0;
color: #333;
font-weight: 700;
font-size: 22px;
text-align: left;
}

.admin-btn {
background: transparent;
color: #888;
border: 1px solid #ddd;
padding: 5px 10px;
font-size: 12px;
border-radius: 4px;
cursor: pointer;
width: auto;
margin: 0;
transition: all 0.2s;
}

.admin-btn:hover {
background: #f0f0f0;
color: #333;
}

.admin-btn.active {
background: #ffecb3;
color: #856404;
border-color: #ffc107;
}

canvas{
width: 100%;
height: auto;
max-height: calc(100vh - 240px); /* Adjusted for header */
object-fit: contain;
border-radius: 8px;
background:#eee;
margin-bottom: 15px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.row {
display: flex;
gap: 10px;
margin-bottom: 10px;
width: 100%;
}

.input-group {
flex: 1;
text-align: left;
}

label {
display: block;
margin-bottom: 4px;
font-weight: 600;
color: #555;
font-size: 14px;
}

input, select {
width: 100%;
padding: 10px;
font-size: 15px;
border-radius: 8px;
border: 2px solid #e0e0e0;
background: #fafafa;
transition: border-color 0.3s;
box-sizing: border-box;
font-family: inherit;
}

input:focus, select:focus {
border-color: #0a7cff;
outline: none;
background: #fff;
}

/* Admin Panel Styling */
.admin-panel {
display: none; /* Hidden by default */
background: #fffbe6;
border: 1px solid #ffe58f;
border-radius: 8px;
padding: 15px;
margin-bottom: 15px;
width: 100%;
box-sizing: border-box;
}

.admin-panel.show {
display: block;
}

.admin-section-title {
font-size: 14px;
font-weight: 700;
color: #d48806;
margin: 0 0 10px 0;
text-transform: uppercase;
}

.color-row {
display: flex;
align-items: center;
gap: 10px;
}

input[type="color"] {
padding: 0;
height: 40px;
width: 60px;
cursor: pointer;
}

button#downloadBtn{
width: 100%;
padding: 12px;
margin-top: 5px;
font-size: 17px;
border-radius: 8px;
border: none;
background: linear-gradient(45deg, #0a7cff, #0056b3);
color: white;
font-weight: bold;
cursor: pointer;
transition: transform 0.2s, box-shadow 0.2s;
}

button#downloadBtn:hover {
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(10, 124, 255, 0.3);
}

@media (max-width: 400px) {
    .row { flex-direction: column; }
    canvas { max-height: 45vh; }
}

</style>
</head>

<body>

<div class="container">

<!-- Header Row -->
<div class="header-row">
    <h3>MIC Prathiba Sangamam</h3>
    <button class="admin-btn" onclick="toggleAdmin()">Admin Login</button>
</div>

<canvas id="canvas" width="2480" height="2953"></canvas>

<!-- Hidden Admin Panel -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-section-title">Admin Settings</div>
    
    <!-- Row: Font Sizes -->
    <div class="row">
        <div class="input-group">
            <label>Name Size</label>
            <input type="number" id="nameSize" value="120">
        </div>
        <div class="input-group">
            <label>Details Size</label>
            <input type="number" id="detailSize" value="90">
        </div>
    </div>

    <!-- Row: Position -->
    <div class="row">
        <div class="input-group">
            <label>Y Position (from Bottom)</label>
            <input type="number" id="yPosInput" value="950">
        </div>
        <div class="input-group">
            <label>Line Spacing</label>
            <input type="number" id="lineSpacing" value="20">
        </div>
    </div>

    <!-- Row: Colors -->
    <div class="row">
        <div class="input-group">
            <label>Text Color</label>
            <div class="color-row">
                <input type="color" id="textColor" value="#ffffff">
                <span id="colorHex" style="font-family:monospace; color:#666;">#ffffff</span>
            </div>
        </div>
    </div>
</div>

<!-- Main Viewer Controls -->
<div class="controls">

<div class="row">
<div class="input-group">
<label>Photo</label>
<input type="file" id="upload" accept="image/*">
</div>
<div class="input-group">
<label>Name</label>
<input type="text" id="nameInput" placeholder="Enter Name">
</div>
</div>

<div class="row">
<div class="input-group">
<label>Class</label>
<select id="classSelect">
<option value="5th">5th</option>
<option value="7th">7th</option>
</select>
</div>
<div class="input-group">
<label>Result</label>
<select id="resultSelect">
<option value="Distinction">Distinction</option>
<option value="Top Plus">Top Plus</option>
</select>
</div>
</div>

<button id="downloadBtn" onclick="downloadImage()">Download Image</button>

</div>

</div>

<script>

// ==========================================
// CORE LOGIC
// ==========================================

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let userImage=null;
let frameImage=new Image();
frameImage.src="frame.png";

let scale=1;
let posX=0;
let posY=0;
let dragging=false;

// Helper to get value
function getVal(id, def) {
    const el = document.getElementById(id);
    return el ? el.value : def;
}

// Draw Function
function drawCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw User Image
    if(userImage){
        let w=userImage.width*scale;
        let h=userImage.height*scale;
        ctx.drawImage(userImage,posX,posY,w,h);
    }

    // Draw Frame
    if(frameImage.complete) { 
        ctx.drawImage(frameImage,0,0,canvas.width,canvas.height);
    }

    // Get Dynamic Values
    const name = document.getElementById("nameInput").value;
    const cls = document.getElementById("classSelect").value;
    const res = document.getElementById("resultSelect").value;
    
    const nameSize = parseInt(getVal("nameSize", 120));
    const detailSize = parseInt(getVal("detailSize", 90));
    const yPosFromBottom = parseInt(getVal("yPosInput", 950));
    const lineSpacing = parseInt(getVal("lineSpacing", 20));
    const textColor = getVal("textColor", "#ffffff");

    // Calculate Positions
    const textY = canvas.height - yPosFromBottom;
    
    // Column X Coordinates
    const col1 = canvas.width / 6;
    const col2 = canvas.width / 2;
    const col3 = canvas.width * 5 / 6;

    // Style
    ctx.fillStyle = textColor;
    ctx.textAlign = "center";

    // Draw Columns
    drawTextBlock(col1, textY, name, cls, res, nameSize, detailSize, lineSpacing);
    drawTextBlock(col2, textY, name, cls, res, nameSize, detailSize, lineSpacing);
    drawTextBlock(col3, textY, name, cls, res, nameSize, detailSize, lineSpacing);
}

// Updated Text Layout: 2 Lines
function drawTextBlock(x, y, name, cls, res, nameSize, detailSize, spacing){
    // Line 1: Name
    ctx.font = `600 ${nameSize}px 'Anek Malayalam'`;
    ctx.fillText(name, x, y);

    // Line 2: Class - Result
    const line2 = `${cls} - ${res}`;
    ctx.font = `600 ${detailSize}px 'Anek Malayalam'`;
    ctx.fillText(line2, x, y + nameSize + spacing);
}

// ==========================================
// EVENT LISTENERS
// ==========================================

// Upload
document.getElementById("upload").addEventListener("change", function(e){
    let reader=new FileReader();
    reader.onload=function(event){
        let img=new Image();
        img.onload=function(){
            userImage=img;
            scale=canvas.width/img.width;
            posX=0;
            posY=0;
            drawCanvas();
        };
        img.src=event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

// Viewer Inputs
["nameInput", "classSelect", "resultSelect"].forEach(id => {
    document.getElementById(id).addEventListener("input", drawCanvas);
});

// Admin Inputs (check if they exist first)
const adminInputs = ["nameSize", "detailSize", "yPosInput", "lineSpacing", "textColor"];
adminInputs.forEach(id => {
    const el = document.getElementById(id);
    if(el) {
        el.addEventListener("input", drawCanvas);
        // Special case for color picker to show hex code
        if(id === "textColor") {
            el.addEventListener("input", function() {
                document.getElementById("colorHex").innerText = this.value;
            });
        }
    }
});

// Drag Logic
let dragStartX, dragStartY, startPosX, startPosY;

canvas.addEventListener("mousedown", e => {
    dragging = true;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    dragStartX = (e.clientX - rect.left) * scaleX;
    dragStartY = (e.clientY - rect.top) * scaleY;
    startPosX = posX;
    startPosY = posY;
});

canvas.addEventListener("mousemove", e => {
    if(!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    posX = startPosX + (mouseX - dragStartX);
    posY = startPosY + (mouseY - dragStartY);
    drawCanvas();
});

window.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("wheel", e => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(0.5, scale), 5);
    drawCanvas();
});

// Download
function downloadImage(){
    const name = document.getElementById("nameInput").value || "campaign";
    const link = document.createElement("a");
    link.download = name + ".png";
    link.href = canvas.toDataURL();
    link.click();
}

// Admin Toggle
function toggleAdmin() {
    const panel = document.getElementById("adminPanel");
    const btn = document.querySelector(".admin-btn");
    
    // Simple Password Check (Client side only for UI control)
    // In a real app this would be server validated.
    if(panel.classList.contains("show")) {
        panel.classList.remove("show");
        btn.innerText = "Admin Login";
        btn.classList.remove("active");
    } else {
        let pass = prompt("Enter Admin Password:");
        if(pass === "admin") { // Password is 'admin'
            panel.classList.add("show");
            btn.innerText = "Admin Logout";
            btn.classList.add("active");
        } else if (pass !== null) {
            alert("Incorrect Password");
        }
    }
}

// Make functions global
window.downloadImage = downloadImage;
window.toggleAdmin = toggleAdmin;

frameImage.onload = drawCanvas;

</script>

</body>
</html>
